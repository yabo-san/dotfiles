# aerospace.toml — i3 for Mac, mirrors GlazeWM 1:1
# alt (option) = lwin on Windows

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10

# Ghostty — float so the quake terminal isn't tiled
[[on-window-detected]]
run = "layout floating"
[on-window-detected.if]
app-id = "com.mitchellh.ghostty"

# ── Keybinds ──────────────────────────────────────────────────────────────────
[mode.main.binding]

# Focus window
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Move workspace to monitor (GlazeWM lwin+shift+hjkl parity)
alt-ctrl-shift-h = 'move-workspace-to-monitor --wrap-around left'
alt-ctrl-shift-l = 'move-workspace-to-monitor --wrap-around right'

# Resize
alt-ctrl-h = 'resize width -50'
alt-ctrl-l = 'resize width +50'
alt-ctrl-j = 'resize height +50'
alt-ctrl-k = 'resize height -50'

# Layout
alt-e       = 'layout tiles horizontal vertical'
alt-t       = 'layout floating tiling'
alt-m       = 'fullscreen'
alt-shift-r = 'reload-config'

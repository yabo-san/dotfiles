# aerospace.toml — mac tiling WM, mirrors the Windows GlazeWM setup 1:1.
# Modifier: alt (option) on mac = lwin on Windows. Same vim layout.
# i3-style, opt-in feel. Workspaces 1-10; 1-4 are the "named" ones (main/
# texting/music/gamedev) with apps auto-homed via on-window-detected below.
#
# Parity map (Windows GlazeWM -> here):
#   lwin+h/j/k/l        -> alt-h/j/k/l       move window (RIGHT works natively
#                          here; no Win+L/Raycast bridge needed on mac)
#   lwin+1..0           -> alt-1..0          go to workspace
#   lwin+shift+1..0     -> alt-shift-1..0    send window to workspace
#   lwin+shift+h/j/k/l  -> alt-shift-h/j/k/l move workspace to monitor
#   lwin+t             -> alt-t             toggle float/tile
#   lwin+m             -> alt-m             fullscreen
#   lwin+shift+r       -> alt-shift-r       reload config

start-at-login = true

# tiling defaults
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10

# ── App auto-homing (= GlazeWM's move --workspace rules) ─────────────────
# Apps land on their workspace on launch. Mirrors the Windows allowlist intent.
[[on-window-detected]]   # browsers -> 1 main
run = "move-node-to-workspace 1"
[on-window-detected.matches]
app-id = "app.zen-browser.zen"

[[on-window-detected]]
run = "move-node-to-workspace 1"
[on-window-detected.matches]
app-id = "company.thebrowser.Browser"   # Arc

[[on-window-detected]]   # chat -> 2 texting
run = "move-node-to-workspace 2"
[on-window-detected.matches]
app-id = "com.hnc.Discord"

[[on-window-detected]]
run = "move-node-to-workspace 2"
[on-window-detected.matches]
app-id = "com.automattic.beeper.desktop"

[[on-window-detected]]   # music -> 3
run = "move-node-to-workspace 3"
[on-window-detected.matches]
app-id = "com.apple.Music"

[[on-window-detected]]   # editors/gamedev -> 4
run = "move-node-to-workspace 4"
[on-window-detected.matches]
app-id = "dev.zed.Zed"

[[on-window-detected]]
run = "move-node-to-workspace 4"
[on-window-detected.matches]
app-id = "org.blenderfoundation.blender"

# ── Keybinds (main mode) ─────────────────────────────────────────────────
[mode.main.binding]

# move window (vim) — right is native here, no bridge
alt-h = 'move left'
alt-j = 'move down'
alt-k = 'move up'
alt-l = 'move right'

# go to workspace (full number row)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# send window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# move whole workspace to monitor (vim) — GlazeWM lwin+shift+hjkl
alt-shift-h = 'move-workspace-to-monitor left'
alt-shift-j = 'move-workspace-to-monitor down'
alt-shift-k = 'move-workspace-to-monitor up'
alt-shift-l = 'move-workspace-to-monitor right'

# window state
alt-t = 'layout floating tiling'   # float/tile toggle (GlazeWM lwin+t)
alt-m = 'fullscreen'               # GlazeWM lwin+m
alt-shift-r = 'reload-config'      # GlazeWM lwin+shift+r

# aerospace.toml — mac tiling WM, mirrors the Windows GlazeWM setup 1:1.
# Modifier: alt (option) on mac = lwin on Windows. Same vim layout.
# Workspaces 1-10; 1-4 are the "named" ones (main/texting/music/gamedev)
# with apps auto-homed via on-window-detected below.
#
# Parity map (GlazeWM -> aerospace):
#   lwin+h/j/k/l        -> alt-h/j/k/l         focus window
#   lwin+shift+h/j/k/l  -> alt-shift-h/j/k/l   move window in tree
#   lwin+1..0           -> alt-1..0             go to workspace
#   lwin+shift+1..0     -> alt-shift-1..0       send window to workspace
#   lwin+t              -> alt-t                toggle float/tile
#   lwin+m              -> alt-m                fullscreen
#   lwin+shift+r        -> alt-shift-r          reload config

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10

# ── App auto-homing (= GlazeWM's move --workspace rules) ─────────────────
[[on-window-detected]]
run = "move-node-to-workspace 1"
[on-window-detected.matches]
app-id = "app.zen-browser.zen"

[[on-window-detected]]
run = "move-node-to-workspace 1"
[on-window-detected.matches]
app-id = "company.thebrowser.Browser"

[[on-window-detected]]
run = "move-node-to-workspace 2"
[on-window-detected.matches]
app-id = "com.hnc.Discord"

[[on-window-detected]]
run = "move-node-to-workspace 2"
[on-window-detected.matches]
app-id = "com.automattic.beeper.desktop"

[[on-window-detected]]
run = "move-node-to-workspace 3"
[on-window-detected.matches]
app-id = "com.apple.Music"

[[on-window-detected]]
run = "move-node-to-workspace 4"
[on-window-detected.matches]
app-id = "dev.zed.Zed"

[[on-window-detected]]
run = "move-node-to-workspace 4"
[on-window-detected.matches]
app-id = "org.blenderfoundation.blender"

[[on-window-detected]]
run = "move-node-to-workspace 4"
[on-window-detected.matches]
# GMEdit (GML editor). Mac bundle-id not confirmed — matching by name; replace with
# app-id once known (find it via: osascript -e 'id of app "GMEdit"').
app-name-regex-substring = "GMEdit"

# ── Keybinds (main mode) ─────────────────────────────────────────────────
[mode.main.binding]

# Focus (GlazeWM lwin+hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window in tree (GlazeWM lwin+shift+hjkl)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-ctrl-h = 'resize width -50'
alt-ctrl-l = 'resize width +50'
alt-ctrl-j = 'resize height +50'
alt-ctrl-k = 'resize height -50'

# Go to workspace (GlazeWM lwin+1..0)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Send window to workspace (GlazeWM lwin+shift+1..0)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# Layout
alt-e     = 'layout tiles horizontal vertical'
alt-t     = 'layout floating tiling'
alt-m     = 'fullscreen'
alt-shift-r = 'reload-config'

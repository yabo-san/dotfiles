# ── Keybinds ──────────────────────────────────────────────────────────────────
[mode.main.binding]

# Move window (GlazeWM lwin+hjkl parity)
alt-h = 'move left'
alt-j = 'move down'
alt-k = 'move up'
alt-l = 'move right'

# Move workspace to monitor (GlazeWM lwin+shift+hjkl parity)
alt-shift-h = 'move-workspace-to-monitor --wrap-around left'
alt-shift-j = 'move-workspace-to-monitor --wrap-around down'
alt-shift-k = 'move-workspace-to-monitor --wrap-around up'
alt-shift-l = 'move-workspace-to-monitor --wrap-around right'

# Switch workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'

# Send window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'

# Layout
alt-e       = 'layout tiles horizontal vertical'
alt-t       = 'layout floating tiling'
alt-m       = 'fullscreen'
alt-shift-r = 'reload-config'

# Prefix
set -g prefix C-b
bind C-b send-prefix

# Splits (| = vertical, - = horizontal, same as % and " but easier)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Start window numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "if command -v pbcopy >/dev/null; then pbcopy; else xclip -selection clipboard; fi"

# Increase history limit
set -g history-limit 10000

# 256 color support
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Catppuccin Mocha
set -g status-style bg='#1e1e2e',fg='#cdd6f4'
set -g status-left '#[bg=#cba6f7,fg=#1e1e2e,bold] ❯ #S '
set -g status-right '#[fg=#cba6f7] %H:%M #[fg=#89b4fa]%m/%d '
set -g status-left-length 20

# Window tabs
set -g window-status-style fg='#89b4fa'
set -g window-status-current-style bg='#cba6f7',fg='#1e1e2e',bold
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# Pane borders
set -g pane-border-style fg='#45475a'
set -g pane-active-border-style fg='#cba6f7'

# Message text
set -g message-style bg='#cba6f7',fg='#1e1e2e'
